
name: Triggering Infra Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-applications:
    strategy:
      matrix:
        environments: [ devnet, testnet ]
    runs-on: ubuntu-latest
    environment: ${{ matrix.environments }}  
    env:
      PLAYBOOK: monitor
      ENVIRONMENT: ${{ matrix.environments }}
      GITHUB_TOKEN: ${{ secrets.DEVOPS_GITHUB_TOKEN }}
    steps:
      - name: Trigger Infra Devnet Deploy Workflow
        run: | 
          response=$(curl -f -L -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  https://api.github.com/repos/drosera-network/infra/actions/workflows/d_deploy_ansible.yml)
          
          workflow_id=$(echo "${response}" | jq -r .id)

          curl -f -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/drosera-network/infra/actions/workflows/${workflow_id}/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"env\":\"${ENVIRONMENT}\",\"playbook\":\"${PLAYBOOK}\"}}"
