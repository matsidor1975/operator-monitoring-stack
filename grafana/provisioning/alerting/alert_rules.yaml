apiVersion: 1
groups:
    - orgId: 1
      name: Operator Eval Group
      folder: operator
      interval: 1m
      rules:
        - uid: aeecqkn99byf4c
          title: Operator Started
          condition: A
          data:
            - refId: A
              queryType: instant
              relativeTimeRange:
                from: 60
                to: 0
              datasourceUid: loki
              model:
                datasource:
                  type: loki
                  uid: loki
                editorMode: builder
                expr: count_over_time({service_name="drosera_operator"} |= `Operator Node successfully spawned!` [1m]) > 0
                intervalMs: 1000
                maxDataPoints: 43200
                queryType: instant
                refId: A
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            summary: Operator is started
          isPaused: false
          notification_settings:
            receiver: Drosera Slack
        - uid: aeecr7yv265mod
          title: Operator Restarting
          condition: A
          data:
            - refId: A
              queryType: instant
              relativeTimeRange:
                from: 60
                to: 0
              datasourceUid: loki
              model:
                datasource:
                    type: loki
                    uid: loki
                editorMode: builder
                expr: count_over_time({service_name="drosera_operator"} |= `Restarting Drosera Operator node` [1m]) > 0
