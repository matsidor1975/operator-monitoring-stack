                refId: A
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            summary: Operator was shutdown
          isPaused: false
          notification_settings:
            receiver: Drosera Slack
        - uid: bdca7yv265mod
          title: Operator No Working RPCs
          condition: A
