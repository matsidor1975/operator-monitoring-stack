        - uid: bef1le9mw2ewwf
          title: High CPU %
          condition: A
          data:
            - refId: A
              relativeTimeRange:
                from: 60
                to: 0
              datasourceUid: prometheus
              model:
                disableTextWrap: false
                editorMode: builder
                expr: avg_over_time(proof_server_process_cpu_usage_percent[1m]) > 75
                fullMetaSearch: false
                includeNullMetadata: true
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
                useBackend: false
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            description: The proof server CPU percentage has breached 25% for the past minute on average
            summary: High proof server CPU percentage
          labels: {}
          isPaused: false
          notification_settings:
            receiver: Drosera Slack
        - uid: o4hlle9mw2ewwf
          title: High Storage Usage
          condition: A
          data:
            - refId: A
              relativeTimeRange:
                from: 60
                to: 0
              datasourceUid: prometheus
              model:
                disableTextWrap: false
                editorMode: builder
                expr: proof_server_process_disk_space_usage_MB > 1000
                fullMetaSearch: false
                includeNullMetadata: true
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
                useBackend: false
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            description: The proof server is using more than 1 GB of storage
            summary: High proof server storage usage
          labels: {}
          isPaused: false
          notification_settings:
            receiver: Drosera Slack
