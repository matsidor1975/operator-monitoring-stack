                maxDataPoints: 43200
                queryType: instant
                refId: A
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            summary: Operator is attempting to restart
          isPaused: false
          notification_settings:
            receiver: Drosera Slack
        - uid: abcd7yv265mod
          title: Operator Shutdown
          condition: A
