                    type: loki
                    uid: loki
                editorMode: builder
                expr: count_over_time({service_name="drosera_operator"} |= `All ETH RPC nodes are unresponsive. Shutting down operator node` [1m]) > 0
                intervalMs: 1000
                maxDataPoints: 43200
                queryType: instant
                refId: A
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            summary: All ETH RPC nodes are unresponsive, operator is shutting down completely
          isPaused: false
          notification_settings:
            receiver: Drosera Slack
